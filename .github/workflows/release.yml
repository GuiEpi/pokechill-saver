name: Release Extension

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build Chrome
        run: bun run zip
        env:
          VITE_DROPBOX_APP_KEY: ${{ secrets.VITE_DROPBOX_APP_KEY }}

      - name: Build Firefox
        run: bun run zip:firefox
        env:
          VITE_DROPBOX_APP_KEY: ${{ secrets.VITE_DROPBOX_APP_KEY }}

      - name: Upload assets to GitHub release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            .output/*-chrome.zip \
            .output/*-firefox.zip \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Chrome Web Store
        continue-on-error: true
        run: |
          bunx wxt submit \
            --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox Add-ons
        continue-on-error: true
        run: |
          bunx wxt submit \
            --firefox-zip .output/*-firefox.zip \
            --firefox-sources-zip .output/*-sources.zip
        env:
          FIREFOX_EXTENSION_ID: pokechill-saver@extension
          FIREFOX_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
